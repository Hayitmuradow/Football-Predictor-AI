<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Robot PRO - Final</title>
    <style>
        :root { --primary: #38bdf8; --secondary: #10b981; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding: 15px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border-top: 5px solid var(--primary); }
        label { display: block; margin: 10px 0 5px; font-size: 0.9em; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; background: var(--primary); color: white; margin-top: 20px; font-size: 1.1em; }
        #res { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; border-left: 5px solid var(--secondary); background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--primary);">⚽ AI ANALYZER PRO</h2>
    
    <label>W1 (Öý koeffisýenti)</label>
    <input type="number" id="k1" step="0.01" placeholder="1.60">

    <label>X (Deňlik koeffisýenti)</label>
    <input type="number" id="kx" step="0.01" placeholder="3.50">

    <label>W2 (Myhman koeffisýenti)</label>
    <input type="number" id="k2" step="0.01" placeholder="4.80">

    <label>Komandanyň Hakyky Ýagdaýy</label>
    <select id="status">
        <option value="1.2">🔥 Öý komanda gaty güýçli (Ruhy belent)</option>
        <option value="1.0" selected>✅ Kadaly ýagdaý (Durnukly)</option>
        <option value="0.8">⚠️ Öý ýadow / Myhman has taýýar</option>
        <option value="0.6">❌ Öýde esasy oýunçylar ýok</option>
    </select>

    <button class="btn" onclick="calc()">ANALIZI GÖR</button>

    <div id="res"></div>
</div>

<script>
    function calc() {
        const v1 = parseFloat(document.getElementById('k1').value);
        const vx = parseFloat(document.getElementById('kx').value);
        const v2 = parseFloat(document.getElementById('k2').value);
        const power = parseFloat(document.getElementById('status').value);
        const resDiv = document.getElementById('res');

        if(!v1 || !vx || !v2) { alert("Koeffisýentleri ýazyň!"); return; }

        // Bukmeker ähtimallygy + Seniň "Güýç" faktoryň
        let p1 = (1/v1) * 100 * power;
        let px = (1/vx) * 100;
        let p2 = (1/v2) * 100;
        let total = p1 + px + p2;

        let finalP1 = ((p1/total)*100).toFixed(1);
        let finalP2 = ((p2/total)*100).toFixed(1);

        resDiv.style.display = "block";
        if(finalP1 > 50) {
            resDiv.innerHTML = `🏆 <b>NETIJE: W1 (Öý utar)</b><br>Takyklyk ähtimallygy: %${finalP1}`;
        } else if(finalP2 > 50) {
            resDiv.innerHTML = `🏆 <b>NETIJE: W2 (Myhman utar)</b><br>Takyklyk ähtimallygy: %${finalP2}`;
        } else {
            resDiv.innerHTML = `⚖️ <b>NETIJE: DEŇLIK (X)</b><br>Oýun gaty kyn we deň geçer.`;
        }
    }
</script>
</body>
</html>
