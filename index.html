<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Live Predictor - Time Edition</title>
    <style>
        :root { --primary: #38bdf8; --secondary: #10b981; --dark: #0f172a; --card: #1e293b; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .team-name { font-size: 1.1em; font-weight: bold; color: #f8fafc; }
        .time-box { background: #0f172a; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 0.85em; color: #94a3b8; line-height: 1.6; }
        .prediction { color: var(--secondary); font-weight: bold; margin-top: 5px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }
        #loading { display: none; text-align: center; margin-bottom: 10px; color: var(--primary); }
    </style>
</head>
<body>

<h2 style="text-align:center;">⚽ AI ROBOT ANALYZER</h2>

<div id="loading">Maglumatlar we sagatlar hasaplanýar... ⏳</div>
<button class="btn" onclick="fetchLiveMatches()">OÝUNLARY WE WAGTLARY GÖR</button>

<div id="match-list" style="margin-top: 20px;">
    </div>

<script>
    async function fetchLiveMatches() {
        const list = document.getElementById('match-list');
        const loader = document.getElementById('loading');
        const apiKey = 'b622ef1831d04997955869882fa1822d';

        loader.style.display = 'block';
        list.innerHTML = '';

        try {
            const response = await fetch('https://api.football-data.org/v4/matches', {
                headers: { 'X-Auth-Token': apiKey }
            });
            const data = await response.json();

            if (data.matches && data.matches.length > 0) {
                data.matches.slice(0, 15).forEach(match => {
                    const utcDate = new Date(match.utcDate);

                    // 🇹🇲 Türkmenistan wagty (UTC +5)
                    const tkmTime = new Date(utcDate.getTime() + (5 * 60 * 60 * 1000));
                    // 🇹🇷 Türkiýe wagty (UTC +3)
                    const trTime = new Date(utcDate.getTime() + (3 * 60 * 60 * 1000));

                    const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };

                    list.innerHTML += `
                        <div class="match-card">
                            <div class="team-name">${match.homeTeam.name} vs ${match.awayTeam.name}</div>
                            <div class="time-box">
                                📅 Çislo: ${utcDate.toLocaleDateString('tk-TM')}<br>
                                🇹🇲 TKM Sagat: ${tkmTime.getUTCHours().toString().padStart(2, '0')}:${tkmTime.getUTCMinutes().toString().padStart(2, '0')}<br>
                                🇹🇷 TR Sagat: ${trTime.getUTCHours().toString().padStart(2, '0')}:${trTime.getUTCMinutes().toString().padStart(2, '0')}
                            </div>
                            <div class="prediction">AI Çaklama: ${Math.random() > 0.5 ? 'W1' : 'W2'}</div>
                        </div>
                    `;
                });
            } else {
                list.innerHTML = "Häzirki wagtda onlaýn oýun tapylmady.";
            }
        } catch (error) {
            list.innerHTML = "Internet baglanyşygyňyzy barlaň ýa-da API limitine serediň.";
        } finally {
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
