<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Live Football Robot</title>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #161e2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-api { background: #10b981; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .match-card { background: #1f2937; margin: 10px 0; padding: 15px; border-radius: 12px; text-align: left; border-left: 5px solid #10b981; }
        .prediction { color: #34d399; font-weight: bold; font-size: 0.9em; margin-top: 5px; }
        #loading { display: none; color: #60a5fa; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 AI LIVE ANALYZER</h2>
        <p style="font-size: 0.8em; color: #94a3b8;">Hakyky onlaýn oýunlary we AI çaklamalaryny görkeziň</p>
        
        <div id="loading">Robot maglumat çekýär... ⏳</div>
        <button class="btn-api" onclick="fetchLiveGames()">JANLY OÝUNLARY ÇEK</button>
        
        <div id="match-list">
            </div>
    </div>

    <script>
        // ROBOT ACHARY (API KEY): Bu ýer hakyky maglumaty çekmäge kömek edýär
        async function fetchLiveGames() {
            const loader = document.getElementById('loading');
            const list = document.getElementById('match-list');
            
            loader.style.display = 'block';
            list.innerHTML = '';

            try {
                // Hakyky dünýäde futbol maglumatlaryny berýän API-a sorag ugradýarys
                // Bellik: Häzirki wagtda demo hökmünde 'mock' maglumatlary ulanýarys,
                // emma 'fetch' funksiýasy hakyky robotyň esasy iş prinsipidir.
                
                setTimeout(() => { // Onlaýn garaşma wagtyny simulýasiýa edýäris
                    const mockMatches = [
                        { home: "Manchester City", away: "Arsenal", score: "1-1", xG_h: 2.1, xG_a: 1.8 },
                        { home: "Real Madrid", away: "Barcelona", score: "0-0", xG_h: 1.5, xG_a: 2.4 },
                        { home: "Bayern Munich", away: "Dortmund", score: "3-1", xG_h: 3.2, xG_a: 1.1 }
                    ];

                    mockMatches.forEach(match => {
                        const prob = (match.xG_h / (match.xG_h + match.xG_a)) * 100;
                        const card = `
                            <div class="match-card">
                                <b>${match.home} vs ${match.away}</b> <small>(${match.score})</small><br>
                                <div class="prediction">
                                    AI Predict: ${prob > 50 ? 'Home Win (W1)' : 'Away Win (W2)'} <br>
                                    Confidence: %${prob.toFixed(1)}
                                </div>
                            </div>
                        `;
                        list.innerHTML += card;
                    });
                    loader.style.display = 'none';
                }, 1500);

            } catch (error) {
                alert("Robot baglanyşykda kynçylyk çekdi!");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
